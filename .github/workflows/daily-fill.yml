name: Daily fill

# Manual trigger only (cron disabled — we batch-generate on demand now).
# Re-enable the cron by uncommenting the schedule block below.
on:
  # schedule:
  #   - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Pages to generate"
        required: false
        default: "10"
      days:
        description: "Spread pin schedule over N days"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: daily-fill
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COUNT: ${{ inputs.count || '10' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_IMAGEN_API_KEY: ${{ secrets.GOOGLE_IMAGEN_API_KEY }}
      ZIPPY_SCHEDULER_API_KEY: ${{ secrets.ZIPPY_SCHEDULER_API_KEY }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_SITE_URL: https://freemonstertruckcoloringpages.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install --quiet Pillow

      - name: Install Node deps
        run: npm ci --prefer-offline --no-audit

      - name: Write .env.local (strip ALL non-printable bytes)
        run: |
          # Strip anything that's not printable ASCII (32-126) from secrets.
          clean() { printf '%s' "$1" | LC_ALL=C tr -cd '\40-\176'; }
          {
            printf 'ANTHROPIC_API_KEY=%s\n' "$(clean "$ANTHROPIC_API_KEY")"
            printf 'GOOGLE_IMAGEN_API_KEY=%s\n' "$(clean "$GOOGLE_IMAGEN_API_KEY")"
            printf 'ZIPPY_SCHEDULER_API_KEY=%s\n' "$(clean "$ZIPPY_SCHEDULER_API_KEY")"
            printf 'CRON_SECRET=%s\n' "$(clean "$CRON_SECRET")"
            printf 'NEXT_PUBLIC_SITE_URL=%s\n' "$NEXT_PUBLIC_SITE_URL"
          } > .env.local
          echo "ANTHROPIC chars: $(awk -F= '/^ANTHROPIC_API_KEY/{print length($2)}' .env.local)"
          # Show first/last 4 chars and hex dump around the boundaries for Anthropic
          grep '^ANTHROPIC_API_KEY=' .env.local | head -c 40
          echo "..."
          grep '^ANTHROPIC_API_KEY=' .env.local | tail -c 20 | od -c | head -2

      - name: Start Next dev server
        run: |
          npm run dev > /tmp/next.log 2>&1 &
          echo "DEV_PID=$!" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Next is up"
              break
            fi
            sleep 2
          done

      - name: Run autopilot (generate + QC + publish pages)
        id: autopilot
        run: |
          RESULT=$(curl -sS -m 1500 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "http://localhost:3000/api/cron?count=${COUNT}")
          echo "$RESULT"
          PUBLISHED=$(echo "$RESULT" | python -c "import sys,json;print(json.load(sys.stdin).get('pagesPublished',0))" 2>/dev/null || echo 0)
          echo "published=${PUBLISHED}" >> $GITHUB_OUTPUT

      - name: Dump Next dev server log
        if: always()
        run: |
          echo "=== /tmp/next.log (last 200 lines) ==="
          tail -200 /tmp/next.log || true

      - name: Stop dev server
        if: always()
        run: kill $DEV_PID 2>/dev/null || true

      - name: Generate PDFs for new pages
        if: steps.autopilot.outputs.published != '0'
        run: python scripts/generate-pdfs.py

      - name: Commit + push pages and PDFs
        if: steps.autopilot.outputs.published != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/ public/images/coloring-pages/ public/pdfs/
          git commit -m "Autopilot: ${{ steps.autopilot.outputs.published }} new coloring pages ($(date +%Y-%m-%d))

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          # Pull any remote changes with rebase before pushing
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main || git rebase --abort || true
            if git push origin main; then
              echo "Pushed on attempt ${attempt}"
              break
            fi
            echo "Push attempt ${attempt} failed, retrying..."
            sleep 5
          done

      - name: Wait for Vercel deploy to propagate
        if: steps.autopilot.outputs.published != '0'
        run: sleep 120

      - name: Generate unique Pinterest pin descriptions
        if: steps.autopilot.outputs.published != '0'
        run: node scripts/generate-pin-descriptions.mjs

      - name: Schedule pins via Zippy (staggered)
        if: steps.autopilot.outputs.published != '0'
        run: node scripts/schedule-pins.mjs --days=${{ inputs.days || 1 }}

      - name: Commit + push pin state
        if: steps.autopilot.outputs.published != '0'
        run: |
          git add src/data/pinned.json src/data/pin-descriptions.json || true
          if git diff --cached --quiet; then
            echo "No pin state changes to commit"
          else
            git commit -m "Autopilot: schedule ${{ steps.autopilot.outputs.published }} new pins ($(date +%Y-%m-%d))

            Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
            git pull --rebase --autostash origin main || git rebase --abort
            git push origin main
          fi

      - name: No-op summary
        if: steps.autopilot.outputs.published == '0'
        run: echo "No pages published — skipping PDF/pin steps."
